name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── tamad: Debian only (daemon feature — no duckdb, no clap) ─────────────
  build-tamad:
    name: Build tamad (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build tamad
        run: cargo build --release --bin tamad --no-default-features --features daemon

      - name: Strip and package
        run: |
          strip target/release/tamad
          mkdir -p dist
          cp target/release/tamad dist/tamad-${{ matrix.suffix }}
          cd dist
          tar czf tamad-${{ matrix.suffix }}.tar.gz tamad-${{ matrix.suffix }}
          sha256sum tamad-${{ matrix.suffix }}.tar.gz > tamad-${{ matrix.suffix }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: tamad-${{ matrix.suffix }}
          path: dist/

  # ── tama: all platforms (cli feature — full) ──────────────────────────────
  build-tama:
    name: Build tama (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
          - os: macos-latest
            suffix: darwin-arm64
          - os: macos-15-intel
            suffix: darwin-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web assets
        run: cd web && npm install && npm run build

      - name: Build tama
        run: cargo build --release --bin tama

      - name: Strip and package
        run: |
          strip target/release/tama
          mkdir -p dist
          cp target/release/tama dist/tama-${{ matrix.suffix }}
          cd dist
          tar czf tama-${{ matrix.suffix }}.tar.gz tama-${{ matrix.suffix }}
          sha256sum tama-${{ matrix.suffix }}.tar.gz > tama-${{ matrix.suffix }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: tama-${{ matrix.suffix }}
          path: dist/

  # ── Debian packages for tama ──────────────────────────────────────────────
  build-deb:
    name: Build Debian Packages
    needs: build-tama
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          name: tama-linux-amd64
          path: dist-amd64

      - uses: actions/download-artifact@v4
        with:
          name: tama-linux-arm64
          path: dist-arm64

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build .deb packages
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          for PAIR in "amd64:amd64" "arm64:arm64"; do
            ARCH="${PAIR%%:*}"
            SUFFIX="${PAIR##*:}"
            PKG="tama_${VERSION}_${ARCH}"

            mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/bin" "${PKG}/usr/share/doc/tama"
            cp "dist-${SUFFIX}/tama-linux-${SUFFIX}" "${PKG}/usr/bin/tama"
            chmod 755 "${PKG}/usr/bin/tama"
            [ -f README.md ] && cp README.md "${PKG}/usr/share/doc/tama/"

            cat > "${PKG}/DEBIAN/control" <<EOF
          Package: tama
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: tama team <hello@mlnja.ai>
          Description: Markdown-native AI agent framework — developer CLI
           tama is the developer tool for scaffolding, linting, and building AI agent projects.
          Homepage: https://github.com/mlnja/tama
          EOF

            dpkg-deb --build "${PKG}"
          done

          sha256sum tama_*.deb > debian-checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: |
            tama_*.deb
            debian-checksums.txt

  # ── GitHub Release ────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-tamad, build-tama, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.deb" -o -name "debian-checksums.txt" \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
