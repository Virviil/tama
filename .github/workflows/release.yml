name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Step 1: build tamad for linux/amd64 first ─────────────────────────────
  # tama embeds the SHA256 of this binary at compile time so it can verify
  # downloads in `tama brew` (supply-chain protection).
  build-tamad-linux-amd64:
    name: Build tamad (linux/amd64)
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build tamad
        run: cargo build --release --bin tamad

      - name: Strip binary
        run: strip target/release/tamad

      - name: Compute SHA256 and package
        id: sha
        run: |
          SHA=$(sha256sum target/release/tamad | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          mkdir -p dist
          cp target/release/tamad dist/tamad-linux-amd64
          cd dist
          tar czf tamad-linux-amd64.tar.gz tamad-linux-amd64
          sha256sum tamad-linux-amd64.tar.gz > tamad-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tamad-linux-amd64
          path: dist/

  # ── Step 2: build tama (all platforms) + tamad (non-amd64 platforms) ──────
  # Web assets must be compiled before Rust so rust-embed can include them.
  # TAMAD_LINUX_AMD64_SHA256 is injected at compile time via option_env!().
  build-release:
    name: Build Release
    needs: build-tamad-linux-amd64
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
            build_tamad: false   # already built in build-tamad-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            suffix: linux-aarch64
            build_tamad: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            suffix: darwin-x86_64
            build_tamad: true
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: darwin-aarch64
            build_tamad: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-x86_64
            build_tamad: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web assets
        run: cd web && npm install && npm run build

      - name: Build tama
        run: cargo build --release --target ${{ matrix.target }} --bin tama
        env:
          TAMAD_LINUX_AMD64_SHA256: ${{ needs.build-tamad-linux-amd64.outputs.sha256 }}

      - name: Build tamad
        if: matrix.build_tamad
        run: cargo build --release --target ${{ matrix.target }} --bin tamad

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/tama
          if [ "${{ matrix.build_tamad }}" = "true" ]; then
            strip target/${{ matrix.target }}/release/tamad
          fi

      - name: Prepare binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tama dist/tama-${{ matrix.suffix }}
          if [ "${{ matrix.build_tamad }}" = "true" ]; then
            cp target/${{ matrix.target }}/release/tamad dist/tamad-${{ matrix.suffix }}
          fi

      - name: Prepare binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/tama.exe dist/tama-${{ matrix.suffix }}.exe
          cp target/${{ matrix.target }}/release/tamad.exe dist/tamad-${{ matrix.suffix }}.exe

      - name: Create tarballs (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf tama-${{ matrix.suffix }}.tar.gz  tama-${{ matrix.suffix }}
          sha256sum tama-${{ matrix.suffix }}.tar.gz > tama-${{ matrix.suffix }}.tar.gz.sha256
          if [ "${{ matrix.build_tamad }}" = "true" ]; then
            tar czf tamad-${{ matrix.suffix }}.tar.gz tamad-${{ matrix.suffix }}
            sha256sum tamad-${{ matrix.suffix }}.tar.gz > tamad-${{ matrix.suffix }}.tar.gz.sha256
          fi

      - name: Create tarballs (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          tar czf tama-${{ matrix.suffix }}.tar.gz  tama-${{ matrix.suffix }}.exe
          tar czf tamad-${{ matrix.suffix }}.tar.gz tamad-${{ matrix.suffix }}.exe
          certutil -hashfile tama-${{ matrix.suffix }}.tar.gz  SHA256 | findstr /v ":" > tama-${{ matrix.suffix }}.tar.gz.sha256
          certutil -hashfile tamad-${{ matrix.suffix }}.tar.gz SHA256 | findstr /v ":" > tamad-${{ matrix.suffix }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  # ── Step 3: Debian packages — tama only ───────────────────────────────────
  # tamad is distributed as a plain tarball (downloaded by `tama brew` at
  # runtime); no deb packaging needed for it.
  build-deb:
    name: Build Debian Packages (tama)
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux x86_64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-gnu
          path: ./dist-x86_64

      - name: Download Linux ARM64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-aarch64-unknown-linux-gnu
          path: ./dist-aarch64

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build Debian packages for tama
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          for ARCH_PAIR in "amd64:x86_64" "arm64:aarch64"; do
            ARCH="${ARCH_PAIR%%:*}"
            SUFFIX="${ARCH_PAIR##*:}"
            DIST_DIR="dist-${SUFFIX}"
            PKG_NAME="tama_${VERSION}_${ARCH}"

            mkdir -p "${PKG_NAME}/DEBIAN"
            mkdir -p "${PKG_NAME}/usr/bin"
            mkdir -p "${PKG_NAME}/usr/share/doc/tama"

            cp "${DIST_DIR}/tama-linux-${SUFFIX}" "${PKG_NAME}/usr/bin/tama"
            chmod 755 "${PKG_NAME}/usr/bin/tama"

            [ -f README.md ] && cp README.md "${PKG_NAME}/usr/share/doc/tama/"

            cat > "${PKG_NAME}/DEBIAN/control" << EOF
          Package: tama
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: tama team <hello@mlnja.ai>
          Description: Markdown-native AI agent framework — developer CLI
           tama is the developer tool for scaffolding, linting, and building AI agent projects.
          Homepage: https://github.com/mlnja/tama
          EOF

            dpkg-deb --build "${PKG_NAME}"
          done

      - name: Generate checksums
        run: sha256sum tama_*.deb > debian-checksums.txt

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: |
            tama_*.deb
            debian-checksums.txt

  # ── Step 4: publish GitHub release ────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-tamad-linux-amd64, build-release, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.deb" -o -name "*checksums.txt" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
